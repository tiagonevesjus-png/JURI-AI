{# Renderiza os campos de um ModelForm com rótulos e mensagens de erro. #}
{% for field in form %}
    <div>
        <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-slate-700 mb-1">
            {{ field.label }}{% if field.field.required %} <span class="text-red-500">*</span>{% endif %}
        </label>
        {{ field }}
        {% if field.help_text %}<p class="text-xs text-slate-400 mt-1">{{ field.help_text }}</p>{% endif %}
        {% for erro in field.errors %}<p class="text-xs text-red-600 mt-1">{{ erro }}</p>{% endfor %}
    </div>
{% endfor %}
