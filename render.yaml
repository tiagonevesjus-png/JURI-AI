# Blueprint do Render.com — implanta a API no plano gratuito, reaproveitando
# um banco PostgreSQL que já existe na sua conta (o Render só permite 1 banco
# free por conta).
#
# Como usar:
#   1) No Render: New > Blueprint > conecte o repositório > Apply.
#   2) Em Environment do serviço "juriai", defina os segredos (sync: false):
#        - DATABASE_URL    -> "Internal Database URL" do seu banco existente
#        - ADMIN_PASSWORD  -> a senha do seu login
#        - ANTHROPIC_API_KEY / OPENAI_API_KEY (se for usar a IA)
#      Depois clique em "Manual Deploy" para aplicar.
#   3) (Opcional) Settings > Custom Domain > adicione tiagonevesadv.com.br.
#
# Observações do plano gratuito:
#   - O serviço web "hiberna" após inatividade (primeiro acesso ~50s).
#   - O disco é efêmero: dados da gestão ficam no Postgres (persistem); arquivos
#     enviados e o índice de IA se perdem ao reiniciar (Q_SYNC processa inline).
#
# Dica: o ideal é um banco dedicado ao Juri-AI. Se reutilizar um banco já usado
# por outro app, mantenha-o como Django/compatível para evitar conflito de tabelas.

services:
  - type: web
    name: juriai
    runtime: python
    plan: free
    branch: main
    buildCommand: >-
      pip install -r requirements-base.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate --noinput &&
      python manage.py setup_inicial
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: ALLOWED_HOSTS
        value: "tiagonevesadv.com.br,www.tiagonevesadv.com.br"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://tiagonevesadv.com.br,https://www.tiagonevesadv.com.br"
      - key: ESCRITORIO_NOME
        value: "Tiago Neves Advocacia Empresarial"
      - key: Q_SYNC
        value: "True"
      - key: ADMIN_USERNAME
        value: tiago
      - key: ADMIN_EMAIL
        value: tiagoneves.jus@gmail.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: IA_EMBEDDING_BACKEND
        value: openai
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
