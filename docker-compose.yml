# Orquestração de produção: caddy (HTTPS), web (gunicorn), worker (fila) e Postgres.
# Uso:
#   1) cp .env.example .env  e preencha (DOMAIN, SECRET_KEY, ADMIN_PASSWORD, chaves...)
#   2) aponte o DNS do domínio (A/AAAA) para o IP deste servidor
#   3) docker compose up -d --build
#   4) acesse https://SEU_DOMINIO  (HTTPS é emitido automaticamente pelo Caddy)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-juriai}
      POSTGRES_USER: ${POSTGRES_USER:-juriai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-juriai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-juriai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - media_data:/srv:ro
      - caddy_data:/data
      - caddy_config:/config

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media
    # Não precisa migrar/coletar estáticos de novo: só processa a fila.
    entrypoint: []
    command: ["python", "manage.py", "qcluster"]

volumes:
  postgres_data:
  media_data:
  static_data:
  caddy_data:
  caddy_config:
